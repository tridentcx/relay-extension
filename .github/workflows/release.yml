name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run checks
        run: npm run check

      - name: Package extension
        run: RELAY_OUTPUT_DIR="${RUNNER_TEMP}" RELAY_CHANNEL=stable npm run package

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/relay-extension-stable-v*.zip
          generate_release_notes: true
          make_latest: true
