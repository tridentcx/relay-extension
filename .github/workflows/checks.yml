name: Checks

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run checks
        run: npm run check

      - name: Package extension
        run: RELAY_OUTPUT_DIR="${RUNNER_TEMP}" RELAY_CHANNEL=stable npm run package

      - name: Upload extension package
        uses: actions/upload-artifact@v4
        with:
          name: relay-extension-package
          path: ${{ runner.temp }}/relay-extension-stable-v*.zip
